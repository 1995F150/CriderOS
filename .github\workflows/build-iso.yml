name: Build CriderOS ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '0 6 * * *'   # nightly 06:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.1-nightly-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ISO
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: ./scripts/build-iso.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: crideros-${{ steps.ver.outputs.version }}-x86_64
          path: |
            out/*.iso
            out/*.sha256
          retention-days: 14

      - name: Publish release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.iso
            out/*.sha256
